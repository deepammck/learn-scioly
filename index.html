<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SciOly Study — Designer Genes, Forensics & Protein Modeling</title>
  <meta name="theme-color" content="#FAF7F0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,900&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- KaTeX — textbook-quality typeset math -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header id="app-header">
  <div class="header-inner">
    <div class="header-title">
      <span class="header-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="color:#00D9F5">
          <path d="M2 2c3 2 5 5 5 10s2 8 5 10M22 22c-3-2-5-5-5-10s-2-8-5-10"/>
          <path d="M7 3.5h10M7 20.5h10M5 7h14M5 17h14"/>
        </svg>
      </span>
      <span>SciOly Study</span>
    </div>
    <div class="header-sub">Designer Genes · Forensics · Protein Modeling</div>
  </div>
</header>

<main id="main-content">

  <!-- ── REFERENCE TAB ─────────────────────────────── -->
  <section id="tab-reference" class="tab-panel active">
    <div class="ref-controls">
      <div class="search-wrap">
        <input type="search" id="search-input" placeholder="Search both guides…" autocomplete="off" spellcheck="false">
        <button id="search-clear" class="search-clear hidden" aria-label="Clear search">✕</button>
      </div>
      <div class="event-tabs">
        <button class="etab active" data-event="desgen">Designer Genes</button>
        <button class="etab" data-event="forensics">Forensics</button>
        <button class="etab" data-event="protmod">Protein Modeling</button>
      </div>
    </div>

    <div id="search-results-panel" class="search-results hidden"></div>

    <div id="guide-layout">
      <nav id="toc-nav">
        <div id="toc-inner"></div>
      </nav>
      <article id="guide-body">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading guide…</p>
        </div>
      </article>
    </div>
  </section>

  <!-- ── CALCULATIONS TAB ───────────────────────────── -->
  <section id="tab-calculations" class="tab-panel">
    <div class="calc-top">
      <div class="event-tabs">
        <button class="etab active" data-calc-event="desgen">Designer Genes</button>
        <button class="etab" data-calc-event="forensics">Forensics</button>
        <button class="etab" data-calc-event="protmod">Protein Modeling</button>
      </div>
    </div>
    <div id="calc-menu" class="calc-menu"></div>
    <div id="calc-workspace" class="calc-workspace hidden"></div>
  </section>

  <!-- ── IMAGE ID TAB ──────────────────────────────── -->
  <section id="tab-imageid" class="tab-panel">
    <div class="imageid-top">
      <div class="event-tabs">
        <button class="etab active" data-id-event="desgen">Designer Genes</button>
        <button class="etab" data-id-event="forensics">Forensics</button>
        <button class="etab" data-id-event="protmod">Protein Modeling</button>
      </div>
    </div>
    <div id="imageid-categories" class="category-grid"></div>
    <div id="imageid-deck" class="flashcard-deck hidden"></div>
  </section>

  <!-- ── LEARN TAB ─────────────────────────────────── -->
  <section id="tab-learn" class="tab-panel">
    <div class="learn-top">
      <div class="event-tabs">
        <button class="etab active" data-learn-event="desgen">Designer Genes</button>
        <button class="etab" data-learn-event="forensics">Forensics</button>
        <button class="etab" data-learn-event="protmod">Protein Modeling</button>
      </div>
      <div id="learn-progress-summary" class="learn-progress-summary"></div>
    </div>
    <div id="learn-curriculum" class="learn-curriculum"></div>
    <div id="learn-lesson"    class="learn-lesson hidden"></div>
  </section>

</main>

<nav id="bottom-nav">
  <button class="nav-btn active" data-tab="reference">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
    </svg>
    <span class="nav-label">Reference</span>
  </button>
  <button class="nav-btn" data-tab="calculations">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 6h8M8 10h4M8 14h8M8 18h4"/>
    </svg>
    <span class="nav-label">Calc</span>
  </button>
  <button class="nav-btn" data-tab="imageid">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/>
    </svg>
    <span class="nav-label">Image ID</span>
  </button>
  <button class="nav-btn" data-tab="learn">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
    </svg>
    <span class="nav-label">Learn</span>
  </button>
</nav>

<!-- Toast notification -->
<div id="toast" class="toast hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="js/calculations.js"></script>
<script src="js/imageID.js"></script>
<script src="js/flashcards.js"></script>
<script src="js/learn.js"></script>
<script src="js/app.js"></script>
</body>
</html>
